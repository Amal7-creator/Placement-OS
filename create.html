<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Placement OS - Create Account</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
  font-family:'Poppins',sans-serif;
}

body{

  background:
  linear-gradient(rgba(5,8,22,0.84), rgba(5,8,22,0.92)),
  url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=2070&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;

  min-height:100vh;
  overflow:auto;
  position:relative;
}

/* Glow Effects */
.glow1{
  position:absolute;
  width:350px;
  height:350px;
  background:#2563eb;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.18;
  top:-100px;
  left:-100px;
}

.glow2{
  position:absolute;
  width:350px;
  height:350px;
  background:#8b5cf6;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.18;
  bottom:-100px;
  right:-100px;
}

/* Glass Card */
.glass{
  background:rgba(17,24,39,0.78);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 40px rgba(0,0,0,0.45);
}

/* Input */
.input-box{
  width:100%;
  background:#0f172a;
  border:1px solid #1e293b;
  padding:16px 16px 16px 50px;
  border-radius:16px;
  color:white;
  outline:none;
  transition:0.3s ease;
}

.input-box:focus{
  border-color:#3b82f6;
  box-shadow:0 0 25px rgba(59,130,246,0.28);
}

/* Input Icon */
.input-wrapper{
  position:relative;
}

.input-icon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:#60a5fa;
  font-size:15px;
}

/* Buttons */
.main-btn{
  width:100%;
  padding:16px;
  border-radius:18px;
  font-weight:600;
  transition:0.3s ease;
}

.main-btn:hover{
  transform:translateY(-3px);
}

/* Create Button */
.create-btn{
  background:linear-gradient(to right,#2563eb,#06b6d4);
}

.create-btn:hover{
  box-shadow:0 10px 30px rgba(37,99,235,0.45);
}

/* Login Button */
.login-btn{
  background:#111827;
  border:1px solid #374151;
}

.login-btn:hover{
  border-color:#3b82f6;
  box-shadow:0 10px 30px rgba(59,130,246,0.20);
}

/* Social Buttons */
.social-btn{
  background:#0f172a;
  border:1px solid #374151;
  transition:0.3s ease;
  min-height:60px;
}

.social-btn:hover{
  border-color:#3b82f6;
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(59,130,246,0.18);
}

/* Divider */
.divider{
  display:flex;
  align-items:center;
  gap:10px;
  color:#9ca3af;
}

.divider div{
  flex:1;
  height:1px;
  background:#374151;
}

/* Animation */
.card-animation{
  animation:float 1s ease;
}

@keyframes float{
  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body class="flex items-center justify-center px-6 py-10">

<!-- GLOW -->
<div class="glow1"></div>
<div class="glow2"></div>

<!-- CREATE CARD -->
<div class="glass card-animation relative z-10 w-full max-w-md rounded-[32px] p-8">

  <!-- LOGO -->
  <div class="text-center">

    <div class="w-20 h-20 mx-auto rounded-3xl bg-gradient-to-r from-blue-600 to-cyan-400 flex items-center justify-center text-4xl shadow-lg shadow-blue-500/30">
      <i class="fa-solid fa-user-plus"></i>
    </div>

    <h1 class="text-4xl font-bold text-white mt-6">
      Create Account
    </h1>

    <p class="text-gray-400 mt-3 leading-relaxed">
      Start your AI-powered placement preparation journey today.
    </p>

  </div>

  <!-- FORM -->
  <form class="mt-10 space-y-5">

    <!-- FULL NAME -->
    <div>

      <label class="text-sm text-gray-300 block mb-2">
        Full Name
      </label>

      <div class="input-wrapper">

        <i class="fa-solid fa-user input-icon"></i>

        <input type="text" id="fullName" placeholder="Enter your full name" class="input-box" />

      </div>

    </div>

    <!-- EMAIL -->
    <div>

      <label class="text-sm text-gray-300 block mb-2">
        Email Address
      </label>

      <div class="input-wrapper">

        <i class="fa-solid fa-envelope input-icon"></i>

        <input type="email" id="email" placeholder="Enter your email" class="input-box" />

      </div>

    </div>

    <!-- PASSWORD -->
    <div>

      <label class="text-sm text-gray-300 block mb-2">
        Password
      </label>

      <div class="input-wrapper">

        <i class="fa-solid fa-lock input-icon"></i>

       <input type="password" id="password" placeholder="Create password" class="input-box" />

      </div>

    </div>

    <!-- CONFIRM PASSWORD -->
    <div>

      <label class="text-sm text-gray-300 block mb-2">
        Confirm Password
      </label>

      <div class="input-wrapper">

        <i class="fa-solid fa-shield-halved input-icon"></i>

        <input type="password" id="confirmPassword" placeholder="Confirm password" class="input-box" />

      </div>

    </div>

    <!-- TERMS -->
    <label class="flex items-center gap-2 text-sm text-gray-400">
  <input
    type="checkbox"
    id="termsCheck"
    class="accent-blue-500">

  I agree to the

  <a
    href="terms.html"
    target="_blank"
    class="text-blue-400 hover:underline">
    Terms & Conditions
  </a>
</label>

    <!-- CREATE BUTTON -->
    <button
  type="button"
  id="signupBtn"
  class="main-btn create-btn text-white flex items-center justify-center gap-3">

  <i class="fa-solid fa-user-plus"></i>
  Create Account

</button>

    <!-- LOGIN BUTTON -->
    <a href="login.html" class="block">

   <button
 type="button"
 class="main-btn login-btn text-white mt-4 flex items-center justify-center gap-3">

  <i class="fa-solid fa-right-to-bracket"></i>
  Back to Login

</button>

    </a>

  </form>

  <!-- DIVIDER -->
  <div class="divider mt-8">
    <div></div>
    OR
    <div></div>
  </div>

  <!-- SOCIAL LOGIN -->
  <div class="grid grid-cols 5 gap-4 mt-8">

    <!-- GOOGLE -->
    <!-- GOOGLE -->
<button
  id="googleSignupBtn"
  type="button"
  class="social-btn rounded-2xl text-white font-medium flex items-center justify-center gap-3">

  <i class="fa-brands fa-google text-xl text-red-400"></i>

  <span>Google</span>

</button>

    <!-- GITHUB -->
    <!button class="social-btn rounded-2xl text-white font-medium flex items-center justify-center gap-3">

      <!i class="fa-brands fa-github text-xl text-white"></i>

      <!span><!GitHub</span>

    <!/button>

  </div>

  <!-- FOOTER -->
  <p class="text-center text-gray-400 mt-8 text-sm leading-relaxed">
    Built for CSE Students • Placement OS © 2026
  </p>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

const googleProvider = new GoogleAuthProvider();

googleProvider.setCustomParameters({
  prompt: "select_account"
});

// ======================================
// EMAIL / PASSWORD SIGNUP
// ======================================

document.getElementById("signupBtn")
.addEventListener("click", async () => {

  const fullName =
    document.getElementById("fullName").value.trim();

  const email =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  const confirmPassword =
    document.getElementById("confirmPassword").value;

  const termsAccepted =
    document.getElementById("termsCheck").checked;

  if (!fullName || !email || !password || !confirmPassword) {
    alert("Please fill all fields");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  if (!termsAccepted) {
    alert("Please accept the Terms & Conditions");
    return;
  }

  try {

    const userCredential =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    console.log(
      "Created User:",
      userCredential.user
    );

    alert("Account Created Successfully!");

    window.location.href =
      "login.html";

  } catch (error) {

    console.error(error);

    alert(error.message);

  }

});

// ======================================
// GOOGLE SIGNUP
// ======================================

// ======================================
// GOOGLE SIGNUP
// ======================================

let googleLoginInProgress = false;

document.getElementById("googleSignupBtn")
.addEventListener("click", async () => {

  try {

    console.log("Opening Google Sign Up...");

    const result = await signInWithPopup(
      auth,
      googleProvider
    );

    const user = result.user;

    alert(
      "Welcome " +
      (user.displayName || user.email)
    );

    window.location.href = "index.html";

  } catch (error) {

    if (error.code === "auth/popup-closed-by-user") {

      console.log("Google sign-up cancelled by user");

      return;

    }

    console.error(error);

    alert(error.message);

  }

});

</script>
</body>
</html>
