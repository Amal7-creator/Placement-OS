<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement OS AI Tutor Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at top left,#1d2b64,transparent 40%),
radial-gradient(circle at bottom right,#2a0845,transparent 40%),
#050814;
color:white;
overflow:hidden;
}

.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.1);
}

.chat-box{
height:calc(100vh - 190px);
overflow-y:auto;
padding:24px;
scroll-behavior:smooth;
background:linear-gradient(
180deg,
rgba(255,255,255,.02),
rgba(255,255,255,.01)
);
border-top:1px solid rgba(255,255,255,.05);
}

.msg{
max-width:92%;
padding:18px 20px;
margin:14px 0;
border-radius:20px;
line-height:2;
white-space:pre-wrap;
font-size:15px;
letter-spacing:.25px;
animation:fadeIn .25s ease;
}

.user{
background:#2563eb;
margin-left:auto;
box-shadow:0 4px 18px rgba(37,99,235,.25);
}

.ai{
background:linear-gradient(
135deg,
rgba(30,41,59,.95),
rgba(15,23,42,.95)
);
border:1px solid rgba(59,130,246,.25);
border-left:5px solid #3b82f6;
box-shadow:
0 10px 35px rgba(59,130,246,.15),
0 4px 20px rgba(0,0,0,.3);
padding:18px;
border-radius:18px;
font-size:15px;
line-height:2;
letter-spacing:.3px;
color:#e5e7eb;
}

.input-bar{
display:flex;
gap:10px;
padding:12px;
}

input{
flex:1;
padding:12px;
border-radius:12px;
background:rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.1);
color:white;
outline:none;
}

.small-btn{
padding:10px 12px;
border-radius:10px;
background:#1f2937;
}

.copyBtn{
font-size:12px;
margin-top:14px;
padding:8px 14px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
border-radius:10px;
display:inline-block;
cursor:pointer;
transition:.25s;
font-weight:600;
}

.copyBtn:hover{
transform:translateY(-2px);
}

.typing{
opacity:.7;
font-style:italic;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body class="flex flex-col h-screen">

<div class="glass p-4 flex justify-between items-center">

<button onclick="window.location.href='index.html'" class="small-btn">
← Back
</button>

<div class="text-center">
<h1 class="font-bold text-xl">🤖 Placement OS AI Tutor Pro</h1>
<p class="text-xs text-gray-300">
Aptitude • DSA • HR • Resume • Technical Interview
</p>
</div>

<button id="clearBtn" class="small-btn">🗑 Clear</button>

</div>

<div id="chat" class="chat-box flex flex-col"></div>

<div class="glass input-bar">
<input id="input" placeholder="Ask anything about placements...">
<button onclick="startVoice()" class="small-btn">🎙️</button>

<input type="file" id="pdfInput" accept="application/pdf" hidden>

<button onclick="document.getElementById('pdfInput').click()" class="small-btn">
📄
</button>

<button id="sendBtn" class="bg-blue-600 px-4 rounded-xl">
Send
</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

const userUID = localStorage.getItem("userUID");

let history =
JSON.parse(localStorage.getItem("chat_ai_" + userUID)) || [];

function saveHistory(){
localStorage.setItem("chat_ai_" + userUID, JSON.stringify(history));
}

function formatAIResponse(text){

text = text.replace(/</g,"&lt;").replace(/>/g,"&gt;");

text = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");

text = text.replace(
/^###\s*(.*)$/gm,
"<div style='font-size:20px;font-weight:700;margin:12px 0;color:#60a5fa'>$1</div>"
);

text = text.replace(
/^(\d+)\.\s+(.*)$/gm,
"<div style='margin-top:14px;font-weight:600;color:#93c5fd'>$1. $2</div>"
);

text = text.replace(
/^([a-zA-Z])\)\s+(.*)$/gm,
"<div style='margin-left:25px'>$1) $2</div>"
);

text = text.replace(/^[\*\-\•]\s+(.*)$/gm,"• $1");

return text.replace(/\n/g,"<br>");
}

function addMsg(text,type,save=true){

const div=document.createElement("div");
div.className="msg "+type;

if(type==="ai"){
div.innerHTML = formatAIResponse(text);
}else{
div.innerHTML = text.replace(/\n/g,"<br>");
}

if(type==="ai"){
const copy=document.createElement("div");
copy.className="copyBtn";
copy.textContent="📋 Copy";

copy.onclick=()=>{
navigator.clipboard.writeText(text);
};

div.appendChild(document.createElement("br"));
div.appendChild(copy);
}

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

if(save){
history.push({text,type});
saveHistory();
}
}

window.onload=()=>{

if(history.length===0){

addMsg(
"👋 Welcome to Placement OS AI.\n\nAsk me Aptitude, DSA, Logical Reasoning, Resume, HR or Technical Interview questions.",
"ai"
);

}else{

history.forEach(m=>{
addMsg(m.text,m.type,false);
});

}
};

async function askAI(question){

try{

const response = await fetch(
"https://placement-os-8s7f.onrender.com/ask-ai",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:question,
history:history
})
}
);

const data = await response.json();

if(data.success){
return data.answer;
}

return "❌ " + data.error;

}catch(error){

console.error(error);

return "❌ Cannot connect to AI server. Make sure server.js is running.";
}
}

async function sendMsg(){

const text=input.value.trim();

if(!text) return;

addMsg(text,"user");
input.value="";

const typing=document.createElement("div");
typing.className="msg ai typing";
typing.textContent="🤖 Thinking...";
chat.appendChild(typing);

const reply=await askAI(text);

typing.remove();

addMsg(reply,"ai");
}

document.getElementById("sendBtn")
.addEventListener("click",sendMsg);

input.addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
sendMsg();
}
});

document.getElementById("clearBtn").onclick=()=>{

localStorage.removeItem("chat_ai_" + userUID);

history=[];

chat.innerHTML="";

addMsg("Chat cleared successfully.","ai");
};

window.startVoice=function(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice recognition not supported.");

return;
}

const recognition =
new SpeechRecognition();

recognition.lang="en-US";

recognition.start();

recognition.onresult=(e)=>{

input.value =
e.results[0][0].transcript;

sendMsg();
};
};

document.getElementById("pdfInput")
.addEventListener(
"change",
async function(e){

const file=e.target.files[0];

if(!file) return;

addMsg("📄 Processing PDF...","user");

const reader=new FileReader();

reader.onload=async function(){

const typedarray =
new Uint8Array(this.result);

const pdf =
await pdfjsLib
.getDocument(typedarray)
.promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

const page =
await pdf.getPage(i);

const content =
await page.getTextContent();

text +=
content.items
.map(x=>x.str)
.join(" ")
+ "\\n";
}

const reply =
await askAI(
`Explain this PDF for placement preparation:

${text.slice(0,6000)}`
);

addMsg(reply,"ai");
};

reader.readAsArrayBuffer(file);

});
</script>

</footer>

<footer class="mt-10 py-6 text-center text-gray-400 border-t border-gray-700">

</a> 


</a>

</footer>


</body>
</html>
